<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>核销记录 - 星彩 FANCLUB</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="data/mock.js"></script>
  <script src="assets/js/transitions.js"></script>
</head>
<body>

  <div class="top-bar">
    <a href="user-center.html" class="back-btn">‹</a>
    <h1>核销记录</h1>
    <div style="width:32px"></div>
  </div>

  <div id="record-list" class="page-enter" style="padding:16px"></div>

  <div class="safe-bottom"></div>

  <nav class="bottom-nav">
    <a href="index.html"><span class="icon">🏪</span>商城</a>
    <a href="calendar.html"><span class="icon">📅</span>活动</a>
    <a href="user-center.html" class="active"><span class="icon">👤</span>我的</a>
  </nav>

  <script>
    const el = document.getElementById('record-list');

    if (!MOCK.verifyRecords.length) {
      el.innerHTML = '<div style="text-align:center;padding:60px;color:var(--muted)"><div style="font-size:48px;margin-bottom:8px">✅</div>暂无核销记录</div>';
    }

    MOCK.verifyRecords.forEach(r => {
      el.innerHTML += `
        <div class="card" style="margin-bottom:16px;overflow:hidden">
          <!-- 头部 -->
          <div style="background:var(--grad);padding:14px 16px;color:white;display:flex;align-items:center;justify-content:space-between">
            <div>
              <div style="font-weight:700;font-size:15px">${r.merchantName}</div>
              <div style="font-size:12px;opacity:0.8;margin-top:2px">📍 ${r.location}</div>
            </div>
            <div style="background:rgba(255,255,255,0.25);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700">已核销 ✓</div>
          </div>

          <!-- 商品明细 -->
          <div style="padding:14px 16px;border-bottom:1px solid var(--border)">
            <div style="font-size:12px;color:var(--muted);margin-bottom:8px">核销商品：</div>
            ${r.goods.map(g => `
              <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0">
                <div style="display:flex;align-items:center;gap:8px">
                  <span style="font-size:22px">${g.emoji}</span>
                  <span style="font-size:14px;font-weight:600">${g.name}</span>
                </div>
                <span style="font-size:14px;font-weight:700;color:var(--purple)">×${g.qty}</span>
              </div>`).join('')}
          </div>

          <!-- 底部信息 -->
          <div style="padding:10px 16px;display:flex;justify-content:space-between;align-items:center">
            <div style="font-size:12px;color:var(--muted)">${r.verifiedAt}</div>
            <div style="font-size:12px;color:var(--muted)">${r.staffName}</div>
          </div>
        </div>`;
    });
  </script>
</body>
</html>
