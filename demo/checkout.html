<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>确认订单 - 星彩 FANCLUB</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="data/mock.js"></script>
  <script src="assets/js/transitions.js"></script>
  <style>
    .pay-method { display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;border-radius:14px;margin-bottom:8px;background:white;box-shadow:var(--shadow); }
    .pay-method .radio { width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center; }
    .pay-method.selected .radio { border-color:var(--pink);background:var(--pink); }
    .pay-method.selected .radio::after { content:'✓';color:white;font-size:12px;font-weight:700; }
    .pay-method.selected { border:2px solid var(--pink); }
    .pay-method { border:2px solid transparent; }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="javascript:history.back()" class="back-btn">‹</a>
    <h1>确认订单</h1>
    <div style="width:32px"></div>
  </div>

  <div class="page-enter" style="padding:16px">

    <!-- 商品信息卡 -->
    <div class="section-title">🛒 订单商品</div>
    <div class="card card-body" style="margin-bottom:20px" id="order-goods-card">
      <!-- 商品列表由 JS 渲染 -->
    </div>

    <!-- 支付方式 -->
    <div class="section-title">💳 支付方式</div>

    <div class="pay-method selected" onclick="selectPay(this,'wallet')" id="pay-wallet">
      <div class="radio"></div>
      <span style="font-size:22px">💰</span>
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px">钱包余额</div>
        <div style="font-size:12px;color:var(--muted)">当前余额：<span id="balance-show">¥--</span></div>
      </div>
      <div style="font-size:11px;color:var(--mint);font-weight:600">推荐</div>
    </div>

    <div class="pay-method" onclick="selectPay(this,'alipay')" id="pay-alipay">
      <div class="radio"></div>
      <span style="font-size:22px">🔵</span>
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px">支付宝</div>
        <div style="font-size:12px;color:var(--muted)">跳转支付宝完成支付</div>
      </div>
    </div>

    <div class="pay-method" onclick="selectPay(this,'wechat')" id="pay-wechat">
      <div class="radio"></div>
      <span style="font-size:22px">🟢</span>
      <div style="flex:1">
        <div style="font-weight:700;font-size:14px">微信支付</div>
        <div style="font-size:12px;color:var(--muted)">跳转微信完成支付</div>
      </div>
    </div>

    <!-- 余额不足提示 -->
    <div id="balance-warn" style="display:none;background:#FFF0F0;border-radius:12px;padding:10px 14px;font-size:13px;color:#FF4C8B;margin-bottom:12px">
      ⚠️ 钱包余额不足，请选择其他支付方式
    </div>

    <!-- 核销说明 -->
    <div class="card card-body" style="margin-top:16px;background:linear-gradient(135deg,#FFF0F9,#F3E8FF)">
      <div style="font-size:13px;font-weight:700;color:var(--purple);margin-bottom:6px">🎫 资产说明</div>
      <div style="font-size:13px;color:var(--text);line-height:1.8">付款成功后，代金券将即时到账至「我的资产」。在线下活动现场向工作人员出示核销二维码即可领取实物。</div>
    </div>

  </div>

  <div style="height:90px"></div>

  <!-- 底部支付按钮 -->
  <div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:white;padding:14px 20px;border-top:1px solid var(--border);box-shadow:0 -4px 20px rgba(168,85,247,0.1)">
    <button class="btn-primary" onclick="doPay()" id="pay-btn">立即支付 ¥--</button>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const fromCart = params.get('from') === 'cart';
    const bal = MOCK.currentUser.balance;
    let selectedPay = 'wallet';
    let orderTotal = 0;
    let orderItems = []; // { product, qty }

    document.getElementById('balance-show').textContent = '¥' + bal.toFixed(2);

    function renderGoods() {
      const card = document.getElementById('order-goods-card');
      let html = '';

      if (fromCart) {
        // 购物车结算模式
        const cartItems = CART.getItems();
        cartItems.forEach(function(item) {
          const p = MOCK.products.find(function(x) { return x.id === item.productId; });
          if (!p) return;
          const m = MOCK.merchants.find(function(x) { return x.id === p.merchantId; });
          orderItems.push({ product: p, qty: item.qty });
          html += `
            <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">
              <div style="width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,#FFF0F9,#F3E8FF);display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0">${p.emoji}</div>
              <div style="flex:1;min-width:0">
                <div style="font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</div>
                <div style="font-size:12px;color:var(--muted)">${m ? m.name : ''}</div>
              </div>
              <div style="text-align:right;flex-shrink:0">
                <div style="font-size:15px;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">¥${p.price * item.qty}</div>
                <div style="font-size:12px;color:var(--muted)">x${item.qty}</div>
              </div>
            </div>`;
        });
        orderTotal = CART.getTotal();
      } else {
        // 单商品直购模式
        const pid = params.get('id') || 'p001';
        const qty = parseInt(params.get('qty')) || 1;
        const p = MOCK.products.find(function(x) { return x.id === pid; });
        const m = p ? MOCK.merchants.find(function(x) { return x.id === p.merchantId; }) : null;
        if (p) {
          orderItems.push({ product: p, qty: qty });
          orderTotal = p.price * qty;
          html += `
            <div style="display:flex;align-items:center;gap:14px">
              <div style="width:64px;height:64px;border-radius:14px;background:linear-gradient(135deg,#FFF0F9,#F3E8FF);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0">${p.emoji}</div>
              <div style="flex:1">
                <div style="font-weight:700;font-size:15px;margin-bottom:4px">${p.name}</div>
                <div style="font-size:12px;color:var(--muted);margin-bottom:6px">${m ? m.name : ''}</div>
                <div style="display:flex;justify-content:space-between;align-items:center">
                  <span style="font-size:18px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">¥${p.price}</span>
                  <span style="font-size:13px;color:var(--muted)">x${qty}</span>
                </div>
              </div>
            </div>`;
        }
      }

      html += `
        <div style="height:1px;background:var(--border);margin:14px 0"></div>
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px">
          <span>商品小计</span><span>¥${orderTotal}</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:13px;color:var(--muted);margin-bottom:6px">
          <span>平台服务费</span><span>¥0</span>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:800;margin-top:8px">
          <span>合计</span>
          <span style="background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">¥${orderTotal}</span>
        </div>`;

      card.innerHTML = html;
      document.getElementById('pay-btn').textContent = '立即支付 ¥' + orderTotal;
    }

    renderGoods();

    function selectPay(el, type) {
      selectedPay = type;
      ['wallet','alipay','wechat'].forEach(function(t) {
        document.getElementById('pay-' + t).classList.remove('selected');
      });
      el.classList.add('selected');
      const warn = document.getElementById('balance-warn');
      if (type === 'wallet' && orderTotal > bal) {
        warn.style.display = 'block';
      } else {
        warn.style.display = 'none';
      }
    }

    function doPay() {
      if (selectedPay === 'wallet' && orderTotal > bal) {
        selectPay(document.getElementById('pay-wallet'), 'wallet');
        return;
      }
      const btn = document.getElementById('pay-btn');
      btn.textContent = '支付中...';
      btn.style.opacity = '0.7';
      setTimeout(function() {
        if (fromCart) {
          DEMO_STATE.set('lastOrder', { fromCart: true, total: orderTotal, payMethod: selectedPay });
          _navigate('pay-success.html?from=cart&total=' + orderTotal + '&pay=' + selectedPay);
        } else {
          const pid = params.get('id') || 'p001';
          const qty = parseInt(params.get('qty')) || 1;
          DEMO_STATE.set('lastOrder', { pid: pid, qty: qty, payMethod: selectedPay });
          _navigate('pay-success.html?id=' + pid + '&qty=' + qty + '&pay=' + selectedPay);
        }
      }, 1000);
    }
  </script>
</body>
</html>
