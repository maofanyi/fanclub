<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>MAO FANCLUB - 商城</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="data/mock.js"></script>
  <script src="assets/js/transitions.js"></script>
  <style>
    .search-bar {
      background: rgba(255,255,255,0.25);
      border-radius: 12px;
      padding: 10px 14px;
      color: white;
      display: flex; align-items: center; gap: 8px;
      font-size: 14px;
    }
    .banner-card {
      background: var(--grad);
      border-radius: 18px;
      padding: 20px;
      color: white;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
      position: relative; overflow: hidden;
    }
    .banner-card .deco { font-size: 72px; opacity: 0.2; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  </style>
</head>
<body>
  <!-- 头部 Hero -->
  <div class="hero-banner">
    <div class="deco">⭐</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;position:relative;z-index:1">
      <div>
        <div style="font-size:22px;font-weight:900;color:white;">MAO FANCLUB ✨</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.85);margin-top:2px;">为你的爱豆点亮每一天</div>
      </div>
      <a href="user-center.html" style="color:white;font-size:28px;text-decoration:none;">🌟</a>
    </div>
    <div class="search-bar" style="position:relative;z-index:1">
      <span>🔍</span>
      <span style="opacity:0.7">搜索商家或商品...</span>
    </div>
  </div>

  <!-- 内容区 -->
  <div style="padding:0 16px;margin-top:-8px;position:relative;z-index:1" class="page-enter">

    <!-- 快捷入口 -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;">
      <div style="text-align:center;cursor:pointer">
        <div style="background:white;border-radius:16px;padding:14px 8px;box-shadow:var(--shadow);font-size:26px;margin-bottom:4px;">🎁</div>
        <div style="font-size:11px;color:var(--muted);font-weight:600;">周边商品</div>
      </div>
      <div style="text-align:center;cursor:pointer">
        <div style="background:white;border-radius:16px;padding:14px 8px;box-shadow:var(--shadow);font-size:26px;margin-bottom:4px;">🎫</div>
        <div style="font-size:11px;color:var(--muted);font-weight:600;">活动门票</div>
      </div>
      <div style="text-align:center;cursor:pointer">
        <div style="background:white;border-radius:16px;padding:14px 8px;box-shadow:var(--shadow);font-size:26px;margin-bottom:4px;">💿</div>
        <div style="font-size:11px;color:var(--muted);font-weight:600;">数字商品</div>
      </div>
      <a href="my-assets.html" style="text-align:center;text-decoration:none">
        <div style="background:white;border-radius:16px;padding:14px 8px;box-shadow:var(--shadow);font-size:26px;margin-bottom:4px;">💖</div>
        <div style="font-size:11px;color:var(--muted);font-weight:600;">我的资产</div>
      </a>
    </div>

    <!-- 活动预告 Banner -->
    <div class="banner-card" style="margin-bottom:20px;cursor:pointer" onclick="location.href='activity.html?id=a001'">
      <div class="deco">🌸</div>
      <div style="position:relative;z-index:1">
        <div style="font-size:11px;background:rgba(255,255,255,0.25);display:inline-block;padding:2px 10px;border-radius:20px;margin-bottom:6px;">📅 活动预告</div>
        <div style="font-size:17px;font-weight:800;">2026 春季见面会</div>
        <div style="font-size:13px;opacity:0.85;margin-top:2px;">3月22日 · 北京五棵松 ></div>
      </div>
    </div>

    <!-- 商家列表 -->
    <div class="section-title">🏪 入驻商家</div>
    <div id="merchant-list" style="display:flex;flex-direction:column;gap:12px;margin-bottom:24px;"></div>

    <!-- 热销商品 -->
    <div class="section-title">🔥 热销商品</div>
    <div id="product-grid" class="grid-2" style="margin-bottom:8px;"></div>

  </div>

  <div class="safe-bottom"></div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="index.html" class="active">
      <span class="icon">🏪</span>商城
    </a>
    <a href="calendar.html">
      <span class="icon">📅</span>活动
    </a>
    <a href="user-center.html">
      <span class="icon">👤</span>我的
    </a>
  </nav>

  <script>
    // 渲染商家列表
    const merchantEl = document.getElementById('merchant-list');
    MOCK.merchants.forEach(m => {
      merchantEl.innerHTML += `
        <a class="merchant-card" href="merchant.html?id=${m.id}">
          <div class="merchant-avatar">${m.avatar}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:15px;margin-bottom:4px">${m.name}</div>
            <div style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.desc}</div>
            <div style="margin-top:6px;display:flex;gap:6px;align-items:center">
              ${m.tags.map(t=>`<span class="tag tag-purple">${t}</span>`).join('')}
            </div>
          </div>
          <div style="text-align:center;flex-shrink:0">
            <div style="font-size:18px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">${m.productCount}</div>
            <div style="font-size:10px;color:var(--muted)">件商品</div>
          </div>
        </a>`;
    });

    // 渲染热销商品
    const productEl = document.getElementById('product-grid');
    MOCK.products.slice(0, 6).forEach(p => {
      productEl.innerHTML += `
        <a class="product-card" href="product.html?id=${p.id}">
          <div class="product-thumb">
            <span>${p.emoji}</span>
            ${p.tags.includes('热销') ? '<span class="tag tag-hot tag-badge" style="position:absolute;top:8px;left:8px">🔥 热销</span>' : ''}
            ${p.tags.includes('限定') ? '<span class="tag tag-pink tag-badge" style="position:absolute;top:8px;left:8px">✨ 限定</span>' : ''}
          </div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px">
              <div class="product-price"><span>¥</span>${p.price}</div>
              <div style="font-size:10px;color:var(--muted)">${p.sold}人购买</div>
            </div>
          </div>
        </a>`;
    });
  </script>
</body>
</html>
