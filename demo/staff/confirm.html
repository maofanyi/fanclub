<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>确认核销 - 工作人员</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../data/mock.js"></script>
  <script src="../assets/js/transitions.js"></script>
  <style>
    body { background: #1A0A2E; min-height:100vh; display:flex; flex-direction:column; }
    .staff-top { background: var(--grad2); padding: 16px 20px; display:flex;align-items:center;gap:12px;color:white; }
    .confirm-area {
      flex: 1; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding: 32px 24px; text-align:center;
    }
    .big-confirm-btn {
      width: 200px; height: 200px;
      border-radius: 50%;
      background: var(--grad2);
      border: none; cursor: pointer;
      color: white; font-size: 72px;
      display: flex; align-items:center; justify-content:center;
      box-shadow: 0 0 0 0 rgba(56,189,248,0.4);
      animation: confirm-pulse 2s infinite;
      transition: transform 0.1s;
      position: relative;
    }
    .big-confirm-btn:active { transform: scale(0.94); }
    @keyframes confirm-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(56,189,248,0.4); }
      50%      { box-shadow: 0 0 0 24px rgba(56,189,248,0); }
    }
    .confirm-ring {
      position: absolute; inset: -12px;
      border-radius: 50%;
      border: 3px solid rgba(56,189,248,0.3);
      animation: spin-ring 4s linear infinite;
    }
    @keyframes spin-ring { to { transform: rotate(360deg); } }

    /* 二次确认弹窗 */
    .modal-sheet { background:#26104A; }
  </style>
</head>
<body>

  <div class="staff-top">
    <a href="javascript:history.back()" class="back-btn">‹</a>
    <div>
      <div style="font-weight:800;font-size:15px">确认核销</div>
      <div style="font-size:11px;opacity:0.8">点击大按钮执行核销</div>
    </div>
    <div style="margin-left:auto;font-size:11px;background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:20px;font-weight:700">👷 工作人员</div>
  </div>

  <!-- 步骤指示器 -->
  <div style="background:#26104A">
    <div class="step-bar" style="background:transparent">
      <div class="step done"><div class="step-dot">✓</div><div class="step-label" style="color:var(--mint)">扫码</div></div>
      <div class="step-line done"></div>
      <div class="step done"><div class="step-dot">✓</div><div class="step-label" style="color:var(--mint)">查看资产</div></div>
      <div class="step-line done"></div>
      <div class="step done"><div class="step-dot">✓</div><div class="step-label" style="color:var(--mint)">选择商品</div></div>
      <div class="step-line done"></div>
      <div class="step done"><div class="step-dot">✓</div><div class="step-label" style="color:var(--mint)">预览</div></div>
      <div class="step-line done"></div>
      <div class="step active"><div class="step-dot">5</div><div class="step-label" style="color:var(--sky)">完成</div></div>
    </div>
  </div>

  <!-- 核销摘要 -->
  <div style="margin:16px;background:rgba(255,255,255,0.06);border-radius:16px;padding:14px;display:flex;align-items:center;justify-content:space-around">
    <div style="text-align:center">
      <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:4px">用户</div>
      <div style="font-size:15px;font-weight:800;color:white">🌟 小星星</div>
    </div>
    <div style="color:rgba(255,255,255,0.2);font-size:20px">→</div>
    <div style="text-align:center">
      <div style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:4px">核销</div>
      <div id="summary-count" style="font-size:22px;font-weight:900;color:var(--sky)">-- 张</div>
    </div>
  </div>

  <div class="confirm-area">
    <div style="color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:28px">
      点击下方按钮<br>完成核销操作
    </div>

    <button class="big-confirm-btn" onclick="showConfirmModal()">
      <div class="confirm-ring"></div>
      ✓
    </button>

    <div style="color:rgba(255,255,255,0.4);font-size:12px;margin-top:24px;line-height:1.7">
      操作将进行最终二次确认<br>确认后资产将立即扣减
    </div>
  </div>

  <!-- 二次确认弹窗 -->
  <div id="modal" style="display:none" class="modal-mask" onclick="if(event.target===this)hideModal()">
    <div class="modal-sheet">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:36px;margin-bottom:8px">⚠️</div>
        <div style="font-size:17px;font-weight:900;color:white;margin-bottom:6px">确认核销？</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.5)">此操作不可撤销，资产将立即扣减</div>
      </div>
      <div id="modal-goods" style="background:rgba(255,255,255,0.06);border-radius:14px;padding:14px;margin-bottom:16px"></div>
      <div style="display:flex;gap:10px">
        <button onclick="hideModal()" class="btn-secondary" style="flex:1;border-color:rgba(255,255,255,0.3);color:rgba(255,255,255,0.6);background:transparent">取消</button>
        <button onclick="doVerify()" class="btn-primary btn-staff" style="flex:2" id="confirm-btn">✓ 确认核销</button>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    let selected = [];
    try { selected = JSON.parse(decodeURIComponent(params.get('sel') || '[]')); } catch {}
    if (!selected.length) selected = [['p001', 2], ['p002', 1]];

    let totalQty = 0;
    selected.forEach(([,q]) => { totalQty += q; });
    document.getElementById('summary-count').textContent = totalQty + ' 张';

    function showConfirmModal() {
      const el = document.getElementById('modal-goods');
      el.innerHTML = '';
      selected.forEach(([pid, qty]) => {
        const v = MOCK.demoTargetUser.vouchers.find(x => x.productId === pid);
        if (!v) return;
        el.innerHTML += `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.1)">
            <div style="color:white;font-size:14px">${v.emoji} ${v.name}</div>
            <div style="color:var(--sky);font-weight:700">×${qty}</div>
          </div>`;
      });
      document.getElementById('modal').style.display = 'flex';
    }

    function hideModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function doVerify() {
      const btn = document.getElementById('confirm-btn');
      btn.textContent = '处理中...';
      btn.disabled = true;
      setTimeout(() => {
        const data = encodeURIComponent(JSON.stringify(selected));
        _navigate('record-done.html?uid=u001&sel=' + data);
      }, 1000);
    }
  </script>
</body>
</html>
