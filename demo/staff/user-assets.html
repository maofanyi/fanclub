<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>用户资产 - 工作人员</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../data/mock.js"></script>
  <script src="../assets/js/transitions.js"></script>
  <style>
    body { background: #1A0A2E; color: white; }
    .staff-top { background: var(--grad2); padding: 16px 20px; display:flex;align-items:center;gap:12px;color:white; }
    .user-scan-card {
      background: linear-gradient(135deg, #26104A, #1A0A2E);
      border: 1px solid rgba(56,189,248,0.3);
      border-radius: 20px;
      padding: 20px;
      margin: 16px;
    }
    .voucher-row {
      background: white;
      border-radius: 14px;
      padding: 14px;
      margin: 0 16px 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
  </style>
</head>
<body>

  <div class="staff-top">
    <a href="scan.html" class="back-btn">‹</a>
    <div>
      <div style="font-weight:800;font-size:15px">核销工作台</div>
      <div style="font-size:11px;opacity:0.8">星彩 Official 周边店 · 核销点1</div>
    </div>
    <div style="margin-left:auto;font-size:11px;background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:20px;font-weight:700">👷 工作人员</div>
  </div>

  <!-- 步骤指示器 -->
  <div style="background:#26104A">
    <div class="step-bar" style="background:transparent">
      <div class="step done"><div class="step-dot">✓</div><div class="step-label" style="color:var(--mint)">扫码</div></div>
      <div class="step-line done"></div>
      <div class="step active"><div class="step-dot">2</div><div class="step-label" style="color:var(--sky)">查看资产</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-dot">3</div><div class="step-label">选择商品</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-dot">4</div><div class="step-label">预览</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-dot">5</div><div class="step-label">完成</div></div>
    </div>
  </div>

  <!-- 扫码识别动画 -->
  <div id="page-content" style="opacity:0;transition:opacity 0.4s">

    <!-- 用户识别成功提示 -->
    <div style="margin:16px;background:rgba(52,211,153,0.15);border:1px solid rgba(52,211,153,0.4);border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px">
      <span style="font-size:20px">✅</span>
      <div style="font-size:13px;font-weight:600;color:#34D399">二维码识别成功，用户身份已验证</div>
    </div>

    <!-- 用户信息卡 -->
    <div class="user-scan-card">
      <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:10px">识别到用户</div>
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:32px;border:2px solid rgba(56,189,248,0.4)">🌟</div>
        <div>
          <div id="u-name" style="font-size:20px;font-weight:900">小星星</div>
          <div id="u-level" style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:2px">SSR粉丝</div>
        </div>
        <div style="margin-left:auto;text-align:center">
          <div style="font-size:10px;color:rgba(255,255,255,0.4)">用户ID</div>
          <div style="font-size:11px;color:var(--sky);font-weight:600" id="u-id">u001</div>
        </div>
      </div>
    </div>

    <!-- 本商家可核销资产 -->
    <div style="padding:0 16px;margin-bottom:10px">
      <div style="font-size:14px;font-weight:700;color:white;margin-bottom:4px">🎫 本商家可核销资产</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.5)">星彩 Official 周边店</div>
    </div>
    <div id="voucher-list"></div>

    <div style="padding:16px;margin-top:4px">
      <a href="select-goods.html?uid=u001" class="btn-primary btn-staff">
        选择核销商品 →
      </a>
    </div>

  </div>

  <script>
    const u = MOCK.demoTargetUser;

    setTimeout(() => {
      document.getElementById('page-content').style.opacity = '1';
    }, 300);

    document.getElementById('u-name').textContent = u.name;
    document.getElementById('u-level').textContent = u.level;
    document.getElementById('u-id').textContent = u.id;

    const el = document.getElementById('voucher-list');
    u.vouchers.forEach(v => {
      el.innerHTML += `
        <div class="voucher-row">
          <div style="width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#FFF0F9,#F3E8FF);display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0">${v.emoji}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:700;font-size:14px;color:var(--text)">${v.name}</div>
          </div>
          <div style="font-size:28px;font-weight:900;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0">${v.count}</div>
          <div style="font-size:12px;color:var(--muted);flex-shrink:0">张</div>
        </div>`;
    });
  </script>
</body>
</html>
