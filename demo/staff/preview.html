<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>核销预览 - 工作人员</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <script src="../data/mock.js"></script>
  <script src="../assets/js/transitions.js"></script>
  <style>
    body { background: #1A0A2E; }
    .staff-top { background: var(--grad2); padding: 16px 20px; display:flex;align-items:center;gap:12px;color:white; }
    .preview-section { background:white;border-radius:18px;margin:0 16px 14px;padding:16px; }
    .preview-row { display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:14px; }
    .preview-row:last-child { border-bottom:none; }
  </style>
</head>
<body>

  <div class="staff-top">
    <a href="javascript:history.back()" class="back-btn">‹</a>
    <div>
      <div style="font-weight:800;font-size:15px">核销预览</div>
      <div style="font-size:11px;opacity:0.8">确认前请仔细核对</div>
    </div>
    <div style="margin-left:auto;font-size:11px;background:rgba(255,255,255,0.2);padding:4px 12px;border-radius:20px;font-weight:700">👷 工作人员</div>
  </div>

  <!-- 步骤指示器 -->
  <div style="background:#26104A">
    <div class="step-bar" style="background:transparent">
      <div class="step done"><div class="step-dot">✓</div><div class="step-label" style="color:var(--mint)">扫码</div></div>
      <div class="step-line done"></div>
      <div class="step done"><div class="step-dot">✓</div><div class="step-label" style="color:var(--mint)">查看资产</div></div>
      <div class="step-line done"></div>
      <div class="step done"><div class="step-dot">✓</div><div class="step-label" style="color:var(--mint)">选择商品</div></div>
      <div class="step-line done"></div>
      <div class="step active"><div class="step-dot">4</div><div class="step-label" style="color:var(--sky)">预览</div></div>
      <div class="step-line"></div>
      <div class="step"><div class="step-dot">5</div><div class="step-label">完成</div></div>
    </div>
  </div>

  <div style="color:rgba(255,255,255,0.5);font-size:13px;text-align:center;padding:14px;background:#26104A">
    ⚠️ 确认后将扣减用户资产，操作不可撤销
  </div>

  <div style="padding-top:14px" class="page-enter">

    <!-- 用户信息 -->
    <div class="preview-section">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">核销用户</div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:28px">🌟</span>
        <div>
          <div style="font-weight:700;font-size:15px">小星星</div>
          <div style="font-size:12px;color:var(--muted)">SSR粉丝 · ID: u001</div>
        </div>
      </div>
    </div>

    <!-- 商家信息 -->
    <div class="preview-section">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">核销商家</div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:40px;height:40px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:22px">⭐</div>
        <div>
          <div style="font-weight:700;font-size:14px">星彩 Official 周边店</div>
          <div style="font-size:12px;color:var(--muted)">核销点1</div>
        </div>
      </div>
    </div>

    <!-- 核销商品明细 -->
    <div class="preview-section">
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">核销商品明细</div>
      <div id="goods-detail"></div>
      <div style="height:1px;background:var(--border);margin:12px 0"></div>
      <div class="preview-row" style="font-weight:800;font-size:15px">
        <span>合计核销</span>
        <span id="total-count" style="background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent">0 张</span>
      </div>
    </div>

    <!-- 核销时间 -->
    <div class="preview-section">
      <div class="preview-row">
        <span style="color:var(--muted)">核销时间</span>
        <span id="verify-time" style="font-weight:600">--</span>
      </div>
      <div class="preview-row">
        <span style="color:var(--muted)">工作人员</span>
        <span style="font-weight:600">工作人员 - 小A</span>
      </div>
    </div>

  </div>

  <!-- 底部按钮 -->
  <div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#26104A;border-top:1px solid rgba(255,255,255,0.1);padding:14px 20px">
    <div style="display:flex;gap:10px">
      <a href="select-goods.html?uid=u001" class="btn-secondary" style="flex:1;text-align:center;padding:14px;">← 重新选择</a>
      <button class="btn-primary btn-staff" style="flex:2" onclick="goConfirm()">确认核销 ✓</button>
    </div>
  </div>

  <div style="height:90px"></div>

  <script>
    const params = new URLSearchParams(location.search);
    let selected = [];
    try { selected = JSON.parse(decodeURIComponent(params.get('sel') || '[]')); } catch {}

    // 如果没有selection参数（比如直接访问），使用演示默认数据
    if (!selected.length) {
      selected = [['p001', 2], ['p002', 1]];
    }

    const el = document.getElementById('goods-detail');
    let totalQty = 0;
    selected.forEach(([pid, qty]) => {
      const v = MOCK.demoTargetUser.vouchers.find(x => x.productId === pid);
      if (!v) return;
      totalQty += qty;
      el.innerHTML += `
        <div class="preview-row">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:20px">${v.emoji}</span>
            <span style="font-weight:600">${v.name}</span>
          </div>
          <span style="font-weight:700;color:var(--purple)">×${qty}</span>
        </div>`;
    });

    document.getElementById('total-count').textContent = totalQty + ' 张';

    // 当前时间
    const now = new Date();
    const timeStr = now.getFullYear() + '-' +
      String(now.getMonth()+1).padStart(2,'0') + '-' +
      String(now.getDate()).padStart(2,'0') + ' ' +
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0');
    document.getElementById('verify-time').textContent = timeStr;

    function goConfirm() {
      const data = encodeURIComponent(JSON.stringify(selected));
      _navigate('confirm.html?uid=u001&sel=' + data + '&time=' + encodeURIComponent(timeStr));
    }
  </script>
</body>
</html>
